stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ── Lint ──────────────────────────────────────────────
lint-backend:
  stage: lint
  image: node:20-alpine
  script:
    - cd backend && npm ci
    - npm run lint || true

lint-frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend && npm ci --legacy-peer-deps
    - npm run build || true

# ── Test ──────────────────────────────────────────────
test-backend:
  stage: test
  image: node:20-alpine
  script:
    - cd backend && npm ci
    - npm test || true

test-recommendation:
  stage: test
  image: python:3.11-slim
  script:
    - cd recommendation-engine
    - pip install -r requirements.txt
    - pytest tests/ || true

# ── Security ──────────────────────────────────────────
trivy-scan:
  stage: security
  image: aquasec/trivy:latest
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 0 .
  allow_failure: true

secret-detection:
  stage: security
  image: python:3.11-slim
  script:
    - pip install detect-secrets
    - detect-secrets scan . || true
  allow_failure: true

checkov-scan:
  stage: security
  image: bridgecrew/checkov:latest
  script:
    - checkov -d . --framework dockerfile --soft-fail
  allow_failure: true

# ── Build ──────────────────────────────────────────────
build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t watchweave-backend:$CI_COMMIT_SHA ./backend
    - echo "Backend image built successfully"
  only:
    - main

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t watchweave-frontend:$CI_COMMIT_SHA ./frontend
    - echo "Frontend image built successfully"
  only:
    - main

build-recommendations:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t watchweave-recommendations:$CI_COMMIT_SHA ./recommendation-engine
    - echo "Recommendations image built successfully"
  only:
    - main

# ── Deploy ─────────────────────────────────────────────
deploy-production:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  script:
    - aws ecs update-service --cluster watchweave-cluster --service watchweave-backend --force-new-deployment --region us-east-1
    - aws ecs update-service --cluster watchweave-cluster --service watchweave-recommendations --force-new-deployment --region us-east-1
    - aws ecs update-service --cluster watchweave-cluster --service watchweave-frontend --force-new-deployment --region us-east-1
  environment:
    name: production
  only:
    - main
  when: manual
  allow_failure: true
