stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

lint-backend:
  stage: lint
  image: node:20-alpine
  script:
    - cd backend && npm ci
    - npm run lint || true

lint-frontend:
  stage: lint
  image: node:20-alpine
  script:
    - cd frontend && npm ci --legacy-peer-deps
    - npm run build || true

test-backend:
  stage: test
  image: node:20-alpine
  script:
    - cd backend && npm ci
    - npm test || true

test-recommendation:
  stage: test
  image: python:3.11-slim
  script:
    - cd recommendation-engine
    - pip install -r requirements.txt
    - pytest tests/ || true

newman-api-tests:
  stage: test
  image: node:20-alpine
  script:
    - npm install -g newman
    - newman run backend/tests/newman/watchweave-api.json --reporters cli || true

trivy-scan:
  stage: security
  image: ubuntu:22.04
  script:
    - apt-get update -y
    - apt-get install -y wget apt-transport-https gnupg
    - wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | apt-key add -
    - echo "deb https://aquasecurity.github.io/trivy-repo/deb jammy main" | tee /etc/apt/sources.list.d/trivy.list
    - apt-get update -y
    - apt-get install -y trivy
    - trivy filesystem --severity HIGH,CRITICAL --exit-code 0 --no-progress .

secret-detection:
  stage: security
  image: python:3.11-slim
  script:
    - pip install detect-secrets
    - detect-secrets scan . || true

checkov-scan:
  stage: security
  image: python:3.11-slim
  script:
    - pip install checkov
    - checkov -d . --framework dockerfile --soft-fail

build-backend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t watchweave-backend:$CI_COMMIT_SHA ./backend
  only:
    - main

build-frontend:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t watchweave-frontend:$CI_COMMIT_SHA ./frontend
  only:
    - main

build-recommendations:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t watchweave-recommendations:$CI_COMMIT_SHA ./recommendation-engine
  only:
    - main

deploy-production:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  script:
    - aws ecs update-service --cluster watchweave-cluster --service watchweave-backend --force-new-deployment --region us-east-1
    - aws ecs update-service --cluster watchweave-cluster --service watchweave-recommendations --force-new-deployment --region us-east-1
    - aws ecs update-service --cluster watchweave-cluster --service watchweave-frontend --force-new-deployment --region us-east-1
  environment:
    name: production
  only:
    - main
  when: manual
  allow_failure: true
