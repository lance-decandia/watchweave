name: WatchWeave CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  lint-and-test-backend:
    name: Lint & Test Backend
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run ESLint
        run: cd backend && npm run lint || true

      - name: Run tests
        run: cd backend && npm test || true

  lint-and-test-recommendation:
    name: Lint & Test Recommendation Engine
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: cd recommendation-engine && pip install -r requirements.txt

      - name: Run Pytest
        run: cd recommendation-engine && pytest tests/ || true

  newman-api-tests:
    name: Newman API Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Newman API Tests
        run: newman run backend/tests/newman/watchweave-api.json --reporters cli

  security-scan-trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  security-scan-snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/package.json --severity-threshold=high

  security-scan-checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          soft_fail: true

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-test-recommendation, newman-api-tests, security-scan-trivy, security-scan-snyk, security-scan-checkov]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/watchweave-backend:${{ github.sha }} ./backend
          docker push $ECR_REGISTRY/watchweave-backend:${{ github.sha }}
          docker tag $ECR_REGISTRY/watchweave-backend:${{ github.sha }} $ECR_REGISTRY/watchweave-backend:latest
          docker push $ECR_REGISTRY/watchweave-backend:latest

      - name: Build and push recommendation engine
        run: |
          docker build -t $ECR_REGISTRY/watchweave-recommendations:${{ github.sha }} ./recommendation-engine
          docker push $ECR_REGISTRY/watchweave-recommendations:${{ github.sha }}
          docker tag $ECR_REGISTRY/watchweave-recommendations:${{ github.sha }} $ECR_REGISTRY/watchweave-recommendations:latest
          docker push $ECR_REGISTRY/watchweave-recommendations:latest

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/watchweave-frontend:${{ github.sha }} ./frontend
          docker push $ECR_REGISTRY/watchweave-frontend:${{ github.sha }}
          docker tag $ECR_REGISTRY/watchweave-frontend:${{ github.sha }} $ECR_REGISTRY/watchweave-frontend:latest
          docker push $ECR_REGISTRY/watchweave-frontend:latest

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster watchweave-cluster \
            --service watchweave-backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy recommendation engine to ECS
        run: |
          aws ecs update-service \
            --cluster watchweave-cluster \
            --service watchweave-recommendations \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster watchweave-cluster \
            --service watchweave-frontend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  owasp-zap-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://watchweave.watch'
          cmd_options: '-a'
